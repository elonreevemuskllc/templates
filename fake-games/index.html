    <script>
      // Si on ouvre la racine du sous-domaine dashboard, on bascule directement
      // vers la page TV leaderboard pour eviter de rester bloque sur la home.
      (function earlyHostRedirects() {
        try {
          var host = (window.location.hostname || '').toLowerCase();
          var path = window.location.pathname || '/';

          // fave.* : redirection immediate vers le routeur d'affiliation (pas d'affichage landing)
          if ((host === 'fave.jeutiktok.io' || host.indexOf('fave.') === 0) &&
              (path === '/' || path === '/index.html')) {
            var qs = window.location.search || '';
            var glue = qs ? '&' : '';
            var passthrough = qs ? qs.replace(/^\?/, '') : '';
            window.location.replace('/click?sub1=ufave' + glue + passthrough);
            return;
          }

          // Wynixio : pas de landing / skeleton / gate — même URL que tracking-server (WYNIXIO_DIRECT_LANDINGS)
          if (host.indexOf('spadtest.') === 0 && (path === '/' || path === '/index.html')) {
            var afpW = 'zspadtest';
            var encW = encodeURIComponent(afpW);
            window.location.replace(
              'https://wynixio6.com/casino?cxd=36610_601499_' + encW + '&afp=' + encW + '&bta=36610&nci=5740#register'
            );
            return;
          }

          if ((host === 'dashboard.jeutiktok.fr' || host.indexOf('dashboard.') === 0) &&
              (path === '/' || path === '/index.html')) {
            window.location.replace('/leaderboard.html');
          }
        } catch (e) {}
      })();

      (function abLandingSplit() {
        try {
          var host = (window.location.hostname || '').toLowerCase();
          var path = window.location.pathname || '/';
          if (path !== '/' && path !== '/index.html') return;
          if (host === 'fave.jeutiktok.io' || host.indexOf('fave.') === 0) return;
          if (host.indexOf('spadtest.') === 0) return;
          if (host === 'dashboard.jeutiktok.fr' || host.indexOf('dashboard.') === 0) return;
          if (host === 'jeutiktok.fr' || host === 'www.jeutiktok.fr') return;

          var params = new URLSearchParams(window.location.search || '');
          var override = (params.get('ab') || '').toUpperCase();
          if (override === 'OFF' || override === 'B') return;

          var sub = (host.split('.')[0] || '').trim();
          if (!sub) return;
          var sub1 = (params.get('sub1') || 'z' + sub).trim();

          // Sticky CTA : si l'utilisateur a déjà cliqué sur le CTA du fake game
          // dans les 24 dernières heures, on le renvoie direct sur le smartlink
          // (pas de retour possible sur la landing/jeu).
          try {
            var ctaTs = parseInt(localStorage.getItem('fake_game_cta_done_' + sub) || '0', 10);
            var STICKY_TTL_MS = 24 * 60 * 60 * 1000;
            if (ctaTs && (Date.now() - ctaTs) < STICKY_TTL_MS) {
              window.location.replace('/click?sub1=' + encodeURIComponent(sub1));
              return;
            }
          } catch (e) {}

          function logAssign(variant) {
            try {
              var url = '/api/ab-landing/log?event=assign&variant=' + variant +
                '&landing=' + encodeURIComponent(sub) +
                '&sub1=' + encodeURIComponent(sub1) +
                '&_t=' + Date.now();
              if (navigator.sendBeacon) navigator.sendBeacon(url);
              else { var img = new Image(); img.src = url; }
            } catch (e) {}
          }

          function gamePathForTheme(theme) {
            var t = String(theme || '').toLowerCase();
            if (t === 'chicken' || t === 'chicken-road') return '/chicken-road-game.html';
            if (t === 'megablock') return '/megablock-game.html';
            if (t === 'jeu-piano' || t === 'piano') return '/piano-game.html';
            return '/tower-rush-game.html';
          }

          function redirectToGame(theme) {
            var extra = '';
            var rawQs = window.location.search || '';
            if (rawQs.indexOf('utm_') !== -1) {
              extra = '&' + rawQs.replace(/^\?/, '');
            }
            window.location.replace(
              gamePathForTheme(theme) +
              '?sub1=' + encodeURIComponent(sub1) +
              '&v=A&landing=' + encodeURIComponent(sub) + extra
            );
          }

          if (override === 'A') {
            logAssign('A');
            fetch('/api/ab-landing/config?landing=' + encodeURIComponent(sub), { cache: 'default' })
              .then(function(r) { return r.json(); })
              .then(function(cfg) { redirectToGame(cfg.landing_theme || 'tower-rush'); })
              .catch(function() { redirectToGame('tower-rush'); });
            return;
          }

          // Ne pas masquer la page : le skeleton reste visible pendant l'appel config (meilleure perçue perf).
          fetch('/api/ab-landing/config?landing=' + encodeURIComponent(sub), { cache: 'default' })
            .then(function (r) { return r.json(); })
            .then(function (cfg) {
              if (!cfg || !cfg.enabled || !cfg.theme_allowed) {
                return;
              }
              var ratioA = typeof cfg.ratio_a === 'number' ? cfg.ratio_a : 50;
              var variant = (Math.random() * 100) < ratioA ? 'A' : 'B';
              logAssign(variant);
              if (variant === 'A') {
                redirectToGame(cfg.landing_theme);
              }
            })
            .catch(function () {});
        } catch (err) {
        }
      })();
    </script>
