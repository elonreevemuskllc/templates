<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aperçu du jeu</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #140e29;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .loader {
            text-align: center;
            opacity: 0.85;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #b64bf9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .label { font-size: 14px; letter-spacing: 0.5px; }
    </style>
<script type="text/javascript">
  (function(c,l,a,r,i,t,y){
    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
  })(window, document, "clarity", "script", "wbbj53so9d");
</script>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div class="label">Aperçu du jeu...</div>
    </div>
    <script>
        (function () {
            var host = (window.location.hostname || '').toLowerCase();
            var sub = (host.split('.')[0] || '').trim();

            // Mapping theme → fake game (identique à index.html)
            function gamePathForTheme(theme) {
                var t = String(theme || '').toLowerCase();
                if (t === 'chicken' || t === 'chicken-road') return '/chicken-road-game.html';
                if (t === 'megablock') return '/megablock-game.html';
                if (t === 'jeu-piano' || t === 'piano') return '/piano-game.html';
                return '/tower-rush-game.html';
            }

            function go(theme) {
                var url = gamePathForTheme(theme) + '?preview=1&landing=' + encodeURIComponent(sub);
                window.location.replace(url);
            }

            // Override manuel possible : /jeu?theme=chicken (utile pour QA)
            var qsTheme = new URLSearchParams(window.location.search || '').get('theme');
            if (qsTheme) { go(qsTheme); return; }

            if (!sub) { go('tower-rush'); return; }

            // On récupère le theme via l'API A/B (single source of truth)
            fetch('/api/ab-landing/config?landing=' + encodeURIComponent(sub), { cache: 'no-store' })
                .then(function (r) { return r.json(); })
                .then(function (cfg) { go(cfg && cfg.landing_theme ? cfg.landing_theme : 'tower-rush'); })
                .catch(function () { go('tower-rush'); });
        })();
    </script>
</body>
</html>
