<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chicken Road - Game</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
        }
        iframe {
            display: block;
            width: 100vw;
            height: calc(100vh - var(--bk-h, 46px));
            border: 0;
        }

        /* ================== HEADER BONUS KONG ================== */
        :root { --bk-h: 46px; }
        .bk-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--bk-h);
            background: #120a2e;
            border-bottom: 1px solid #1f1447;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
            z-index: 9998;
            font-family: 'Arial Black', 'Arial', sans-serif;
            box-sizing: border-box;
        }
        .bk-burger {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 3px;
            width: 24px;
            height: 24px;
            padding: 3px 2px;
            cursor: pointer;
            flex-shrink: 0;
            box-sizing: border-box;
        }
        .bk-burger span {
            display: block;
            width: 100%;
            height: 2px;
            background: #e9e6f3;
            border-radius: 2px;
        }
        .bk-logo {
            flex: 0 1 auto;
            min-width: 0;
            height: 28px;
            display: flex;
            align-items: center;
        }
        .bk-logo img {
            height: 100%;
            width: auto;
            max-width: 100%;
            display: block;
            object-fit: contain;
        }
        .bk-logo-fallback {
            display: flex;
            align-items: center;
            gap: 3px;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 0.5px;
            line-height: 1;
            white-space: nowrap;
        }
        .bk-logo-fallback .bk-b { color: #9d57f0; }
        .bk-logo-fallback .bk-k { color: #d8f934; }
        .bk-logo img.bk-broken { display: none; }
        .bk-logo img.bk-broken + .bk-logo-fallback { display: flex; }

        .bk-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .bk-btn {
            position: relative;
            border: 0;
            padding: 6px 12px;
            font-family: inherit;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.3px;
            cursor: pointer;
            line-height: 1;
            white-space: nowrap;
            border-radius: 3px;
        }
        .bk-btn-login {
            background: #6d2fb8;
            color: #ffffff;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.35);
            clip-path: polygon(4% 10%, 95% 3%, 100% 50%, 97% 95%, 6% 98%, 0% 55%, 2% 20%);
        }
        .bk-btn-login::before {
            content: "";
            position: absolute;
            inset: -2px -5px -2px -3px;
            background: #d8f934;
            z-index: -1;
            clip-path: polygon(88% 5%, 100% 25%, 96% 55%, 100% 90%, 85% 100%, 80% 60%, 83% 30%);
        }
        .bk-btn-signup {
            background: #d8f934;
            color: #2a0d5c;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.3);
            clip-path: polygon(5% 2%, 96% 8%, 100% 50%, 95% 96%, 4% 100%, 0% 55%, 3% 15%);
        }
        .bk-btn-signup::before {
            content: "";
            position: absolute;
            inset: -2px -3px -2px -5px;
            background: #6d2fb8;
            z-index: -1;
            clip-path: polygon(0% 20%, 12% 3%, 20% 40%, 16% 70%, 14% 95%, 3% 85%);
        }
        .bk-btn:active { transform: translateY(1px); filter: brightness(0.92); }

        /* Responsive mobile — most traffic is mobile TikTok */
        @media (max-width: 420px) {
            :root { --bk-h: 44px; }
            .bk-header { padding: 0 8px; gap: 6px; }
            .bk-logo { height: 24px; }
            .bk-logo-fallback { font-size: 12px; gap: 2px; }
            .bk-btn { padding: 5px 9px; font-size: 11px; border-radius: 2px; }
            .bk-actions { gap: 4px; }
            .bk-burger { width: 22px; height: 22px; }
        }
        @media (max-width: 340px) {
            .bk-btn { padding: 4px 7px; font-size: 10px; }
            .bk-logo { height: 22px; }
        }
        .fg-popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            font-family: 'Arial Black', 'Arial', sans-serif;
        }
        .fg-popup.visible {
            display: flex;
        }
        .fg-popup .box {
            position: relative;
            width: 260px;
            max-width: 88vw;
            text-align: center;
        }
        .fg-popup .card {
            background: #111;
            border: 4px solid #f5c400;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 18px;
        }
        .fg-popup .stripe {
            height: 22px;
            background: repeating-linear-gradient(
                45deg,
                #f5c400 0px,
                #f5c400 12px,
                #1a1a1a 12px,
                #1a1a1a 24px
            );
        }
        .fg-popup .card-body {
            padding: 14px 16px 16px;
        }
        .fg-popup h2 {
            margin: 0 0 4px;
            font-size: 34px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            text-shadow: 2px 2px 0 #000;
        }
        .fg-popup .label {
            font-size: 16px;
            font-weight: 900;
            color: #f5c400;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 8px;
        }
        .fg-popup .offer {
            font-size: 15px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }
        .fg-popup .cta {
            display: block;
            width: 100%;
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            padding: 13px;
            border-radius: 50px;
            border: 0;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .fg-popup .cta.green {
            background: linear-gradient(180deg, #6cdd3a 0%, #3eb80a 100%);
            border-bottom: 4px solid #2a8a05;
        }
        .fg-popup .cta.green:hover {
            background: linear-gradient(180deg, #7aee45 0%, #4acb10 100%);
        }
        .fg-popup .cta.orange {
            background: linear-gradient(180deg, #ff9d2e 0%, #e8750a 100%);
            border-bottom: 4px solid #a84f00;
        }
        .fg-popup .cta.orange:hover {
            background: linear-gradient(180deg, #ffae4a 0%, #f88517 100%);
        }
    </style>
<script type="text/javascript">
  (function(c,l,a,r,i,t,y){
    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);

</head>
<body>
    <header class="bk-header" id="bk-header">
        <div class="bk-burger" id="bk-burger" aria-label="Menu">
            <span></span><span></span><span></span>
        </div>
        <div class="bk-logo">
            <img src="/bonuskong-logo.png" alt="Bonus Kong" onerror="this.classList.add('bk-broken')" />
            <div class="bk-logo-fallback"><span class="bk-b">BONUS</span><span class="bk-k">KONG</span></div>
        </div>
        <div class="bk-actions">
            <button type="button" class="bk-btn bk-btn-login" id="bk-login">Se Connecter</button>
            <button type="button" class="bk-btn bk-btn-signup" id="bk-signup">S'inscrire</button>
        </div>
    </header>

    <iframe
        id="game-frame"
        src="/cr2/chickenroad2/index.html?v=1774482082&lang=en&langLock=1&operatorId=local-operator&gameMode=chicken-road-two&currency=EUR&difficulty=HARDCORE"
        allow="autoplay; fullscreen; clipboard-write"
        allowfullscreen>
    </iframe>

    <div id="balance-popup" class="fg-popup" role="dialog" aria-modal="true" aria-labelledby="balance-popup-title">
        <div class="box">
            <div class="card">
                <div class="stripe"></div>
                <div class="card-body">
                    <h2 id="balance-popup-title">TU AS GAGNÉ</h2>
                    <p class="label">BONUS GRATUIT</p>
                    <p class="offer">20€ DÉPOSÉS = 40€ EN JEU</p>
                </div>
                <div class="stripe"></div>
            </div>
            <button class="cta green" type="button" id="balance-cta">JE RÉCUPÈRE</button>
        </div>
    </div>

    <div id="retry-popup" class="fg-popup" role="dialog" aria-modal="true" aria-labelledby="retry-popup-title">
        <div class="box">
            <div class="card">
                <div class="stripe"></div>
                <div class="card-body">
                    <h2 id="retry-popup-title">OH NON !</h2>
                    <p class="label">TU AS TOUT PERDU</p>
                    <p class="offer">TENTE TA CHANCE À NOUVEAU</p>
                </div>
                <div class="stripe"></div>
            </div>
            <button class="cta orange" type="button" id="retry-cta">RESSAYER</button>
        </div>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search || '');
            var sub1 = (params.get('sub1') || '').trim();
            var landing = (params.get('landing') || '').trim();
            if (!sub1 && landing) sub1 = 'z' + landing;
            if (!sub1) sub1 = 'zchickenroad';

            var SMARTLINK = 'https://smartlinks.aprilftd.com/click?sub1=' + encodeURIComponent(sub1);
            function resolveRedirectTarget() {
                var raw = (params.get('to') || '').trim();
                if (!raw) return null;
                try { return decodeURIComponent(raw); } catch (e) { return raw; }
            }
            // Clé localStorage par landing (chaque affilié garde son propre état)
            var LS_KEY = 'fakegame_claimed_' + (landing || sub1.replace(/^z/, '') || 'default');

            // Mode preview/démo : ?preview=1 → aucune popup, aucune redirection, le jeu tourne libre
            var PREVIEW_MODE = params.get('preview') === '1' || params.get('demo') === '1';
            if (PREVIEW_MODE) {
                try { localStorage.removeItem(LS_KEY); } catch (e) {}
                // Cache le header et fait prendre tout l'écran à l'iframe
                document.documentElement.style.setProperty('--bk-h', '0px');
                document.addEventListener('DOMContentLoaded', function () {
                    var hdr = document.getElementById('bk-header');
                    if (hdr) hdr.style.display = 'none';
                });
            }

            var redirected = false;
            function doRedirect(source) {
                if (PREVIEW_MODE) { console.log('[preview] redirect bloqué:', source); return; }
                if (redirected) return;
                redirected = true;
                try { localStorage.setItem(LS_KEY, '1'); } catch (e) {}
                try {
                    var url = '/api/ab-landing/log?event=' + encodeURIComponent(source || 'cta_click') +
                        '&variant=A' +
                        '&landing=' + encodeURIComponent(landing || sub1.replace(/^z/, '')) +
                        '&sub1=' + encodeURIComponent(sub1) +
                        '&_t=' + Date.now();
                    if (navigator.sendBeacon) navigator.sendBeacon(url);
                    else { var img = new Image(); img.src = url; }
                } catch (e) {}
                try {
                    new Image().src = '/api/sparta-pixel?afp=' + encodeURIComponent(sub1) + '&offer=Chicken+Road&_t=' + Date.now();
                    new Image().src = '/api/april-pixel?afp=' + encodeURIComponent(sub1) + '&tracking_code=' + encodeURIComponent(sub1) + '&offer=Chicken+Road&_t=' + Date.now();
                } catch (e) {}
                setTimeout(function () { window.location.replace(resolveRedirectTarget() || SMARTLINK); }, 150);
            }

            // Short-circuit : si déjà vu la popup win, skip le jeu et va direct au smartlink
            // Pas de pixel ici (déjà compté lors du 1er click) — redirection silencieuse
            // (skipé en mode preview)
            if (!PREVIEW_MODE) {
                try {
                    if (localStorage.getItem(LS_KEY) === '1') {
                        redirected = true;
                        setTimeout(function () { window.location.replace(resolveRedirectTarget() || SMARTLINK); }, 0);
                        return;
                    }
                } catch (e) {}
            }

            var balancePopup = document.getElementById('balance-popup');
            var balanceCta = document.getElementById('balance-cta');
            var retryPopup = document.getElementById('retry-popup');
            var retryCta = document.getElementById('retry-cta');
            var iframe = document.getElementById('game-frame');

            var winShown = false;
            var retryShown = false;
            var sawNonZero = false;

            balanceCta.addEventListener('click', function () { doRedirect('cta_click'); });
            retryCta.addEventListener('click', function () { window.location.reload(); });

            if (!PREVIEW_MODE) {
                setInterval(function () {
                    if (winShown || retryShown) return;
                    try {
                        var game = iframe.contentWindow.__INHOUSE_LOCAL_GAME__;
                        if (!game || typeof game.balance !== 'number') return;

                        if (game.balance > 0) sawNonZero = true;

                        // WIN : balance ≥ 100 → popup "TU AS GAGNÉ" + lock localStorage
                        if (game.balance >= 100) {
                            winShown = true;
                            try { localStorage.setItem(LS_KEY, '1'); } catch (e) {}
                            balancePopup.classList.add('visible');
                            return;
                        }

                        // RETRY : balance = 0 (tout perdu) → popup "OH NON"
                        // Anti faux-positif : ne trigger que si on a observé balance > 0 avant
                        if (game.balance <= 0 && sawNonZero) {
                            retryShown = true;
                            retryPopup.classList.add('visible');
                        }
                    } catch (e) {}
                }, 500);
            }

            // Debug QA : ?_test=win ou ?_test=retry
            var testMode = params.get('_test');
            if (testMode === 'win' || testMode === '1') {
                winShown = true;
                try { localStorage.setItem(LS_KEY, '1'); } catch (e) {}
                balancePopup.classList.add('visible');
            } else if (testMode === 'retry') {
                retryShown = true;
                retryPopup.classList.add('visible');
            }

            window.FbPlayableAd = {
                onCTAClick: function () { doRedirect('cta_click'); },
                onAdClick: function () { doRedirect('cta_click'); },
                getCTAClickEvent: function () { return 'cta_click'; }
            };

            var loginBtn = document.getElementById('bk-login');
            var signupBtn = document.getElementById('bk-signup');
            var burgerBtn = document.getElementById('bk-burger');
            if (loginBtn) loginBtn.addEventListener('click', function () { doRedirect('header_login'); });
            if (signupBtn) signupBtn.addEventListener('click', function () { doRedirect('header_signup'); });
            if (burgerBtn) burgerBtn.addEventListener('click', function () { doRedirect('header_burger'); });
        })();
    </script>

    <!-- Bouton "Quitter la démo" — apparaît après 15s -->
    <div id="quit-demo-btn" style="display:none;position:fixed;top:calc(var(--bk-h, 46px) + 12px);right:12px;z-index:99999;">
        <button id="quit-demo-inner" onclick="window.FbPlayableAd && window.FbPlayableAd.onCTAClick()">Quitter la démo</button>
    </div>
    <style>
        #quit-demo-inner {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 8px;
            font-weight: 900;
            line-height: 1.2;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            background: radial-gradient(circle at 35% 35%, #ff9a5c, #e8400a);
            box-shadow: 0 0 0 0 rgba(232,64,10,0.7);
            animation: qd-fadein 0.5s ease forwards, qd-pulse 1.8s ease-in-out 0.5s infinite;
            position: relative;
            overflow: hidden;
        }
        #quit-demo-inner::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 60%;
            height: 200%;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.45) 50%, transparent 60%);
            animation: qd-shimmer 2.2s ease-in-out infinite;
        }
        #quit-demo-inner:active { transform: scale(0.93); }
        @keyframes qd-fadein {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes qd-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(232,64,10,0.7); }
            60%  { box-shadow: 0 0 0 8px rgba(232,64,10,0); }
            100% { box-shadow: 0 0 0 0 rgba(232,64,10,0); }
        }
        @keyframes qd-shimmer {
            0%   { left: -60%; }
            50%  { left: 120%; }
            100% { left: 120%; }
        }
    </style>
    <script>
        setTimeout(function () {
            try {
                var p = new URLSearchParams(window.location.search || '');
                if (p.get('preview') === '1' || p.get('demo') === '1') return;
            } catch (e) {}
            var btn = document.getElementById('quit-demo-btn');
            if (btn) btn.style.display = 'block';
        }, 15000);
    </script>

<div id="tuto-overlay" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.80);align-items:center;justify-content:center;padding:10px;box-sizing:border-box;">
  <div style="position:relative;width:100%;max-width:210px;background:#111;border:1px solid #333;border-radius:12px;overflow:hidden;font-family:Arial,sans-serif;">
    <!-- Titre -->
    <div style="background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:6px 10px;text-align:center;">

      <video id="tuto-video" src="/tuto-chicken.mp4" autoplay muted loop playsinline style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#000;pointer-events:none;"></video>
    </div>
    <!-- Texte + bouton -->
    <div style="padding:6px 8px;text-align:center;">
      <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:5px 8px;color:#eee;font-size:10px;line-height:1.35;">
        Empile <strong style="color:#f0c040;">2</strong> puis fais <strong style="color:#f0c040;">cashout</strong> · <span style="color:#f0c040;font-weight:700;">Mode Hardcore = +gains</span><br/>
        <span style="color:#ff5555;font-weight:700;">⚠ Le piège :</span> <span style="color:#fff;">arrête au <strong style="color:#6dffb3;">1er/2e passage</strong></span>

      </div>
      <button onclick="closeTuto()" style="margin-top:5px;width:100%;padding:8px;border:none;border-radius:8px;background:#222;border:1px solid #444;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">Jouer →</button>
    </div>
    <!-- X -->
    <button onclick="closeTuto()" style="position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;border:none;background:#222;color:#aaa;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;">✕</button>
  </div>
</div>
<script>
(function(){
  var p=new URLSearchParams(window.location.search||'');
  if(p.get('preview')==='1'||p.get('demo')==='1') return;
  function show(){var o=document.getElementById('tuto-overlay');if(o)o.style.display='flex';}
  window.closeTuto=function(){
    var o=document.getElementById('tuto-overlay');if(o)o.style.display='none';
    var v=document.getElementById('tuto-video');if(v){v.pause();v.currentTime=0;}
  };
  document.readyState==='loading'?document.addEventListener('DOMContentLoaded',show):show();
})();
</script>
